<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AUTOWORKS — Build &amp; Drive</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Oswald:wght@500;600;700&family=Roboto+Condensed:wght@400;500;700&family=JetBrains+Mono:wght@400;600;800&display=swap" rel="stylesheet">
<style>
  :root{
    --bg: #14171c;
    --panel: #1c222b;
    --panel-2: #232a34;
    --border: #323a47;
    --orange: #ff6a1a;
    --cyan: #4fd1e8;
    --chrome: #e9ecef;
    --dim: #8b93a1;
  }
  *{box-sizing:border-box; margin:0; padding:0;}
  html,body{width:100%; height:100%; background:var(--bg); overflow:hidden;}
  body{font-family:'Roboto Condensed', sans-serif; color:var(--chrome);}
  .hidden{display:none !important;}

  /* ---------- GARAGE SCREEN ---------- */
  #garage-screen{
    width:100%; height:100%; display:flex; flex-direction:column;
    background:
      linear-gradient(var(--bg), var(--bg)),
      repeating-linear-gradient(0deg, rgba(255,255,255,0.025) 0px, rgba(255,255,255,0.025) 1px, transparent 1px, transparent 28px),
      repeating-linear-gradient(90deg, rgba(255,255,255,0.025) 0px, rgba(255,255,255,0.025) 1px, transparent 1px, transparent 28px);
  }
  header.topbar{
    display:flex; align-items:baseline; gap:14px;
    padding:16px 24px; border-bottom:2px solid var(--border);
    background:linear-gradient(180deg, var(--panel-2), var(--panel));
    flex-shrink:0;
  }
  header.topbar .mark{
    width:10px; height:26px; background:var(--orange);
    transform:skewX(-12deg);
  }
  header.topbar h1{
    font-family:'Oswald', sans-serif; font-weight:700; font-size:22px;
    letter-spacing:2px; text-transform:uppercase;
  }
  header.topbar span.sub{
    font-family:'JetBrains Mono', monospace; font-size:11px; color:var(--dim);
    letter-spacing:1px; text-transform:uppercase; padding-left:6px; border-left:1px solid var(--border);
  }

  #garage-main{
    flex:1; display:flex; overflow:hidden;
  }

  #spec-panel{
    width:340px; flex-shrink:0; overflow-y:auto;
    background:var(--panel); border-right:1px solid var(--border);
    padding:18px;
  }
  .spec-section{margin-bottom:22px;}
  .spec-section h2{
    font-family:'JetBrains Mono', monospace; font-size:11px; letter-spacing:2px;
    color:var(--orange); text-transform:uppercase; margin-bottom:10px;
    display:flex; align-items:center; gap:8px;
  }
  .spec-section h2::before{content:"◆"; font-size:9px;}

  .swatch-row{display:flex; flex-wrap:wrap; gap:8px;}
  .swatch{
    width:38px; height:38px; border-radius:4px; cursor:pointer;
    border:2px solid var(--border); transition:transform .12s, border-color .12s;
    position:relative;
  }
  .swatch:hover{transform:translateY(-2px);}
  .swatch.active{border-color:var(--orange); box-shadow:0 0 0 2px rgba(255,106,26,0.35);}

  .opt-list{display:flex; flex-direction:column; gap:8px;}
  .opt-btn{
    text-align:left; background:var(--panel-2); border:1px solid var(--border);
    color:var(--chrome); padding:10px 12px; border-radius:4px; cursor:pointer;
    font-family:'Roboto Condensed', sans-serif; font-size:14px;
    display:flex; justify-content:space-between; align-items:center;
    transition:border-color .12s, background .12s;
  }
  .opt-btn:hover{border-color:var(--cyan);}
  .opt-btn.active{border-color:var(--orange); background:#2b2118;}
  .opt-btn .name{font-weight:500;}
  .opt-btn .tag{font-family:'JetBrains Mono', monospace; font-size:10px; color:var(--dim);}
  .opt-btn.active .tag{color:var(--orange);}

  #viewport-col{
    flex:1; display:flex; flex-direction:column; min-width:0;
  }
  #preview-wrap{
    flex:1; position:relative; min-height:0;
    background:radial-gradient(ellipse at 50% 30%, #232a34 0%, #14171c 75%);
  }
  #preview-canvas{width:100%; height:100%; display:block;}
  .vin-tag{
    position:absolute; top:16px; left:16px;
    font-family:'JetBrains Mono', monospace; font-size:11px; color:var(--dim);
    background:rgba(20,23,28,0.7); padding:6px 10px; border:1px solid var(--border); border-radius:3px;
    letter-spacing:1px;
  }
  .vin-tag b{color:var(--cyan);}

  #buildsheet{
    flex-shrink:0; display:flex; align-items:center; gap:26px;
    padding:16px 24px; background:var(--panel); border-top:1px solid var(--border);
  }
  .stat{min-width:90px;}
  .stat .lbl{font-family:'JetBrains Mono', monospace; font-size:10px; color:var(--dim); letter-spacing:1px;}
  .stat .val{font-family:'JetBrains Mono', monospace; font-size:22px; font-weight:800; color:var(--chrome);}
  .stat .val small{font-size:12px; color:var(--dim); font-weight:400;}
  .bar{width:80px; height:5px; background:var(--panel-2); border:1px solid var(--border); margin-top:5px;}
  .bar i{display:block; height:100%; background:var(--cyan);}

  #drive-btn{
    margin-left:auto; background:var(--orange); color:#1a1004; border:none;
    font-family:'Oswald', sans-serif; font-weight:700; letter-spacing:1.5px;
    text-transform:uppercase; padding:14px 26px; border-radius:4px; cursor:pointer;
    font-size:15px; transition:filter .12s;
  }
  #drive-btn:hover{filter:brightness(1.12);}

  /* ---------- DRIVE SCREEN ---------- */
  #drive-screen{ width:100%; height:100%; position:relative; }
  #drive-canvas{ width:100%; height:100%; display:block; }

  #hud{
    position:absolute; inset:0; pointer-events:none;
    font-family:'JetBrains Mono', monospace;
  }
  #hud-top{
    position:absolute; top:0; left:0; right:0; display:flex; justify-content:space-between; align-items:flex-start;
    padding:16px 20px;
  }
  #car-id{
    background:rgba(20,23,28,0.75); border:1px solid var(--border); border-radius:4px;
    padding:8px 12px; font-size:12px; color:var(--dim); letter-spacing:1px;
  }
  #car-id b{color:var(--cyan); display:block; font-size:13px; letter-spacing:0.5px; margin-bottom:2px; font-family:'Oswald',sans-serif;}
  #return-btn{
    pointer-events:all; background:var(--panel); border:1px solid var(--border); color:var(--chrome);
    font-family:'Oswald', sans-serif; font-weight:600; letter-spacing:1px; text-transform:uppercase;
    padding:10px 16px; border-radius:4px; cursor:pointer; font-size:12px;
  }
  #return-btn:hover{border-color:var(--orange);}

  #speed-gauge{
    position:absolute; bottom:22px; left:50%; transform:translateX(-50%);
    background:rgba(20,23,28,0.78); border:1px solid var(--border); border-radius:8px;
    padding:12px 26px; text-align:center; min-width:170px;
  }
  #speed-val{font-size:40px; font-weight:800; color:var(--chrome); line-height:1;}
  #speed-val span{font-size:13px; color:var(--dim); font-weight:400; margin-left:4px;}
  #gear-row{margin-top:6px; font-size:11px; letter-spacing:2px; color:var(--dim);}
  #gear-row b{color:var(--orange);}

  #controls-hint{
    position:absolute; bottom:22px; right:20px;
    background:rgba(20,23,28,0.78); border:1px solid var(--border); border-radius:6px;
    padding:10px 14px; font-size:11px; color:var(--dim); line-height:1.7;
  }
  #controls-hint b{color:var(--chrome);}

  /* ---------- TOUCH CONTROLS ---------- */
  #touch-controls{
    position:absolute; inset:0; pointer-events:none; display:none;
  }
  #touch-controls.active{display:block;}
  .tbtn{
    pointer-events:all; position:absolute;
    display:flex; align-items:center; justify-content:center;
    background:rgba(28,34,43,0.65); border:2px solid rgba(255,255,255,0.12);
    border-radius:16px; color:var(--chrome); font-family:'Oswald',sans-serif;
    font-weight:600; font-size:26px; -webkit-tap-highlight-color:transparent;
    user-select:none; touch-action:none;
  }
  .tbtn.pressed{background:rgba(255,106,26,0.55); border-color:var(--orange);}
  #steer-left{ left:18px; bottom:120px; width:74px; height:74px; }
  #steer-right{ left:104px; bottom:120px; width:74px; height:74px; }
  #btn-brake{ right:18px; bottom:120px; width:74px; height:74px; background:rgba(28,34,43,0.65); font-size:13px; }
  #btn-accel{ right:104px; bottom:120px; width:74px; height:74px; font-size:13px; }
  #btn-hand{ right:18px; bottom:206px; width:160px; height:46px; font-size:12px; letter-spacing:1px; text-transform:uppercase; }

  ::-webkit-scrollbar{width:8px;}
  ::-webkit-scrollbar-track{background:var(--panel);}
  ::-webkit-scrollbar-thumb{background:var(--border); border-radius:4px;}

  @media (max-width:760px){
    #garage-main{flex-direction:column; overflow-y:auto;}
    #spec-panel{width:100%; border-right:none; border-bottom:1px solid var(--border); max-height:44vh;}
    #preview-wrap{min-height:260px;}
    #buildsheet{flex-wrap:wrap; row-gap:12px;}
    #drive-btn{margin-left:0; width:100%; order:10;}
    #controls-hint{display:none;}
    #speed-gauge{bottom:266px;}
  }
</style>
</head>
<body>

<!-- ================= GARAGE SCREEN ================= -->
<div id="garage-screen">
  <header class="topbar">
    <div class="mark"></div>
    <h1>Autoworks</h1>
    <span class="sub">Assembly Bay 03 — Build &amp; Test Drive</span>
  </header>

  <div id="garage-main">
    <div id="spec-panel">
      <div class="spec-section">
        <h2>Body Color</h2>
        <div class="swatch-row" id="color-row"></div>
      </div>
      <div class="spec-section">
        <h2>Wheels</h2>
        <div class="opt-list" id="wheel-row"></div>
      </div>
      <div class="spec-section">
        <h2>Spoiler</h2>
        <div class="opt-list" id="spoiler-row"></div>
      </div>
      <div class="spec-section">
        <h2>Engine</h2>
        <div class="opt-list" id="engine-row"></div>
      </div>
    </div>

    <div id="viewport-col">
      <div id="preview-wrap">
        <canvas id="preview-canvas"></canvas>
        <div class="vin-tag">BUILD NO. <b id="vin-out">GT-000000</b></div>
      </div>
      <div id="buildsheet">
        <div class="stat">
          <div class="lbl">TOP SPEED</div>
          <div class="val" id="stat-top">—<small>km/h</small></div>
        </div>
        <div class="stat">
          <div class="lbl">0–100 KM/H</div>
          <div class="val" id="stat-accel">—<small>s</small></div>
        </div>
        <div class="stat">
          <div class="lbl">HANDLING</div>
          <div class="val" id="stat-handling">—<small>/10</small></div>
          <div class="bar"><i id="handling-bar" style="width:0%"></i></div>
        </div>
        <button id="drive-btn">Start Test Drive →</button>
      </div>
    </div>
  </div>
</div>

<!-- ================= DRIVE SCREEN ================= -->
<div id="drive-screen" class="hidden">
  <canvas id="drive-canvas"></canvas>
  <div id="hud">
    <div id="hud-top">
      <div id="car-id"><b id="drive-vin">GT-000000</b><span id="drive-engine">Standard</span></div>
      <button id="return-btn">← Return to Garage</button>
    </div>
    <div id="speed-gauge">
      <div id="speed-val">0<span>km/h</span></div>
      <div id="gear-row">GEAR <b id="gear-out">D</b></div>
    </div>
    <div id="controls-hint">
      <div><b>W / ↑</b> Accelerate</div>
      <div><b>S / ↓</b> Brake / Reverse</div>
      <div><b>A D / ← →</b> Steer</div>
      <div><b>SPACE</b> Handbrake</div>
    </div>
    <div id="touch-controls">
      <div class="tbtn" id="steer-left">◀</div>
      <div class="tbtn" id="steer-right">▶</div>
      <div class="tbtn" id="btn-accel">GAS</div>
      <div class="tbtn" id="btn-brake">BRAKE</div>
      <div class="tbtn" id="btn-hand">HANDBRAKE</div>
    </div>
  </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script>
/* ============================================================
   DATA
============================================================ */
const BODY_COLORS = [
  {name:'Racing Red', hex:0xE23D28},
  {name:'Cobalt Blue', hex:0x2B5FA8},
  {name:'Safety Yellow', hex:0xF2C230},
  {name:'Graphite', hex:0x2E333B},
  {name:'Arctic White', hex:0xEDEFF2},
  {name:'Signal Orange', hex:0xFF6A1A},
];
const WHEELS = [
  {id:'standard', name:'Standard', tag:'Balanced'},
  {id:'sport', name:'Sport Alloy', tag:'+Handling'},
  {id:'offroad', name:'Off-Road', tag:'+Grip / -Speed'},
];
const SPOILERS = [
  {id:'none', name:'None', tag:'—'},
  {id:'small', name:'Small Lip', tag:'+Handling'},
  {id:'large', name:'GT Wing', tag:'++Handling / -Speed'},
];
const ENGINES = [
  {id:'standard', name:'2.0L Standard', top:150, accel:8.2, power:1.0},
  {id:'turbo', name:'2.5L Turbo', top:190, accel:6.0, power:1.35},
  {id:'v8', name:'5.0L V8', top:225, accel:4.3, power:1.7},
];

let config = {
  bodyColor: BODY_COLORS[0].hex,
  wheelType: 'standard',
  spoiler: 'none',
  engine: 'standard',
};
let vin = 'GT-' + Math.floor(100000 + Math.random()*899999);

function computeStats(cfg){
  const engine = ENGINES.find(e=>e.id===cfg.engine);
  let top = engine.top;
  let accel = engine.accel;
  let handling = 5;
  if(cfg.wheelType === 'sport') handling += 2;
  if(cfg.wheelType === 'offroad'){ top -= 15; handling += 1; }
  if(cfg.spoiler === 'small') handling += 1;
  if(cfg.spoiler === 'large'){ handling += 2; top -= 6; }
  handling = Math.max(1, Math.min(10, handling));
  return {top: Math.round(top), accel: accel.toFixed(1), handling, power: engine.power};
}

/* ============================================================
   CAR MESH BUILDER (shared by garage preview + drive scene)
============================================================ */
function buildCar(cfg){
  const group = new THREE.Group();
  const bodyMat = new THREE.MeshStandardMaterial({color: cfg.bodyColor, metalness:0.55, roughness:0.35});
  const darkMat = new THREE.MeshStandardMaterial({color:0x14171b, metalness:0.3, roughness:0.7});
  const glassMat = new THREE.MeshStandardMaterial({color:0x1a2733, metalness:0.9, roughness:0.15});

  const chassis = new THREE.Mesh(new THREE.BoxGeometry(2.0,0.5,4.2), bodyMat);
  chassis.position.y = 0.55;
  chassis.castShadow = true;
  group.add(chassis);

  const cabin = new THREE.Mesh(new THREE.BoxGeometry(1.55,0.5,2.0), bodyMat);
  cabin.position.set(0,1.02,-0.2);
  cabin.castShadow = true;
  group.add(cabin);

  const windows = new THREE.Mesh(new THREE.BoxGeometry(1.58,0.36,1.9), glassMat);
  windows.position.set(0,1.06,-0.2);
  group.add(windows);

  const bumperGeo = new THREE.BoxGeometry(2.05,0.32,0.28);
  const frontBumper = new THREE.Mesh(bumperGeo, darkMat);
  frontBumper.position.set(0,0.4,2.12);
  group.add(frontBumper);
  const rearBumper = new THREE.Mesh(bumperGeo, darkMat);
  rearBumper.position.set(0,0.4,-2.12);
  group.add(rearBumper);

  const hlGeo = new THREE.BoxGeometry(0.26,0.14,0.05);
  const hlMat = new THREE.MeshStandardMaterial({color:0xffffff, emissive:0xffffcc, emissiveIntensity:0.9});
  [0.62,-0.62].forEach(x=>{
    const hl = new THREE.Mesh(hlGeo, hlMat);
    hl.position.set(x,0.6,2.14);
    group.add(hl);
  });
  const tlMat = new THREE.MeshStandardMaterial({color:0x330000, emissive:0xff2200, emissiveIntensity:0.7});
  [0.62,-0.62].forEach(x=>{
    const tl = new THREE.Mesh(hlGeo, tlMat);
    tl.position.set(x,0.6,-2.14);
    group.add(tl);
  });

  const wheelRadius = cfg.wheelType === 'offroad' ? 0.42 : 0.36;
  const wheelWidth = cfg.wheelType === 'offroad' ? 0.32 : 0.26;
  const tireColor = 0x0d0f12;
  const rimColor = cfg.wheelType === 'sport' ? 0xF2C230 : 0xaeb4bb;
  const tireGeo = new THREE.CylinderGeometry(wheelRadius, wheelRadius, wheelWidth, 20);
  const tireMat = new THREE.MeshStandardMaterial({color: tireColor, roughness:0.9});
  const rimGeo = new THREE.CylinderGeometry(wheelRadius*0.52, wheelRadius*0.52, wheelWidth+0.03, 10);
  const rimMat = new THREE.MeshStandardMaterial({color: rimColor, metalness:0.8, roughness:0.3});

  const wheelPositions = [
    [0.98, wheelRadius, 1.42],
    [-0.98, wheelRadius, 1.42],
    [0.98, wheelRadius, -1.42],
    [-0.98, wheelRadius, -1.42],
  ];
  group.wheels = [];
  wheelPositions.forEach(pos=>{
    const wg = new THREE.Group();
    const tire = new THREE.Mesh(tireGeo, tireMat);
    tire.rotation.z = Math.PI/2;
    wg.add(tire);
    const rim = new THREE.Mesh(rimGeo, rimMat);
    rim.rotation.z = Math.PI/2;
    wg.add(rim);
    wg.position.set(pos[0], pos[1], pos[2]);
    group.add(wg);
    group.wheels.push(wg);
  });

  if(cfg.spoiler === 'small'){
    const sp = new THREE.Mesh(new THREE.BoxGeometry(1.6,0.08,0.3), darkMat);
    sp.position.set(0,1.05,-2.05);
    group.add(sp);
  } else if(cfg.spoiler === 'large'){
    const standGeo = new THREE.BoxGeometry(0.08,0.35,0.08);
    [0.7,-0.7].forEach(x=>{
      const s = new THREE.Mesh(standGeo, darkMat);
      s.position.set(x,1.05,-1.95);
      group.add(s);
    });
    const wing = new THREE.Mesh(new THREE.BoxGeometry(1.9,0.08,0.5), bodyMat);
    wing.position.set(0,1.3,-1.95);
    group.add(wing);
  }

  return group;
}

/* ============================================================
   GARAGE PREVIEW SCENE
============================================================ */
const previewCanvas = document.getElementById('preview-canvas');
const previewRenderer = new THREE.WebGLRenderer({canvas: previewCanvas, antialias:true, alpha:true});
const previewScene = new THREE.Scene();
const previewCamera = new THREE.PerspectiveCamera(38, 1, 0.1, 100);
previewCamera.position.set(4.2, 2.4, 5.4);
previewCamera.lookAt(0,0.6,0);

previewScene.add(new THREE.HemisphereLight(0xbfd8ff, 0x14171c, 0.9));
const previewKey = new THREE.DirectionalLight(0xffffff, 1.0);
previewKey.position.set(5,8,4);
previewScene.add(previewKey);
const previewRim = new THREE.DirectionalLight(0x4fd1e8, 0.4);
previewRim.position.set(-5,3,-5);
previewScene.add(previewRim);

const previewFloor = new THREE.Mesh(
  new THREE.CircleGeometry(3.2, 48),
  new THREE.MeshStandardMaterial({color:0x1c222b, roughness:0.9})
);
previewFloor.rotation.x = -Math.PI/2;
previewScene.add(previewFloor);

let previewCar = buildCar(config);
previewScene.add(previewCar);

function resizePreview(){
  const w = previewCanvas.clientWidth, h = previewCanvas.clientHeight;
  if(w===0||h===0) return;
  previewRenderer.setSize(w,h,false);
  previewCamera.aspect = w/h;
  previewCamera.updateProjectionMatrix();
}

let garageActive = true;
function animatePreview(){
  if(garageActive){
    resizePreview();
    previewCar.rotation.y += 0.008;
    previewRenderer.render(previewScene, previewCamera);
  }
  requestAnimationFrame(animatePreview);
}
animatePreview();

function rebuildPreviewCar(){
  previewScene.remove(previewCar);
  previewCar = buildCar(config);
  previewScene.add(previewCar);
}

/* ============================================================
   UI WIRING (garage)
============================================================ */
const colorRow = document.getElementById('color-row');
BODY_COLORS.forEach((c,i)=>{
  const el = document.createElement('div');
  el.className = 'swatch' + (i===0 ? ' active':'');
  el.style.background = '#' + c.hex.toString(16).padStart(6,'0');
  el.title = c.name;
  el.addEventListener('click', ()=>{
    config.bodyColor = c.hex;
    [...colorRow.children].forEach(ch=>ch.classList.remove('active'));
    el.classList.add('active');
    rebuildPreviewCar();
  });
  colorRow.appendChild(el);
});

function buildOptRow(container, items, key, extraTag){
  items.forEach((item,i)=>{
    const el = document.createElement('button');
    el.className = 'opt-btn' + (i===0 ? ' active':'');
    el.innerHTML = `<span class="name">${item.name}</span><span class="tag">${extraTag ? extraTag(item) : (item.tag||'')}</span>`;
    el.addEventListener('click', ()=>{
      config[key] = item.id;
      [...container.children].forEach(ch=>ch.classList.remove('active'));
      el.classList.add('active');
      rebuildPreviewCar();
      refreshStats();
    });
    container.appendChild(el);
  });
}
buildOptRow(document.getElementById('wheel-row'), WHEELS, 'wheelType');
buildOptRow(document.getElementById('spoiler-row'), SPOILERS, 'spoiler');
buildOptRow(document.getElementById('engine-row'), ENGINES, 'engine', e=>`${e.top} km/h`);

document.getElementById('vin-out').textContent = vin;

function refreshStats(){
  const s = computeStats(config);
  document.getElementById('stat-top').innerHTML = s.top + '<small>km/h</small>';
  document.getElementById('stat-accel').innerHTML = s.accel + '<small>s</small>';
  document.getElementById('stat-handling').innerHTML = s.handling + '<small>/10</small>';
  document.getElementById('handling-bar').style.width = (s.handling*10) + '%';
}
refreshStats();

/* ============================================================
   DRIVE SCENE
============================================================ */
const garageScreen = document.getElementById('garage-screen');
const driveScreen = document.getElementById('drive-screen');
const driveCanvas = document.getElementById('drive-canvas');
const driveRenderer = new THREE.WebGLRenderer({canvas: driveCanvas, antialias:true});
driveRenderer.shadowMap.enabled = true;

const driveScene = new THREE.Scene();
driveScene.background = new THREE.Color(0x8fc7e8);
driveScene.fog = new THREE.Fog(0x8fc7e8, 40, 160);

const driveCamera = new THREE.PerspectiveCamera(60, 1, 0.1, 500);

driveScene.add(new THREE.HemisphereLight(0xbfe0ff, 0x2e3d24, 0.85));
const sun = new THREE.DirectionalLight(0xfff3d6, 1.0);
sun.position.set(40,60,20);
sun.castShadow = true;
sun.shadow.mapSize.set(1024,1024);
sun.shadow.camera.left = -60; sun.shadow.camera.right = 60;
sun.shadow.camera.top = 60; sun.shadow.camera.bottom = -60;
driveScene.add(sun);

// ---- Ground: proving-ground asphalt with painted grid ----
function makeAsphaltTexture(){
  const c = document.createElement('canvas');
  c.width = c.height = 512;
  const ctx = c.getContext('2d');
  ctx.fillStyle = '#3a3f47';
  ctx.fillRect(0,0,512,512);
  for(let i=0;i<3000;i++){
    ctx.fillStyle = `rgba(${20+Math.random()*30},${20+Math.random()*30},${20+Math.random()*30},0.3)`;
    ctx.fillRect(Math.random()*512, Math.random()*512, 2, 2);
  }
  ctx.strokeStyle = 'rgba(255,255,255,0.18)';
  ctx.lineWidth = 2;
  ctx.strokeRect(4,4,504,504);
  const tex = new THREE.CanvasTexture(c);
  tex.wrapS = tex.wrapT = THREE.RepeatWrapping;
  tex.repeat.set(30,30);
  return tex;
}
const arenaSize = 200;
const ground = new THREE.Mesh(
  new THREE.PlaneGeometry(arenaSize, arenaSize),
  new THREE.MeshStandardMaterial({map: makeAsphaltTexture(), roughness:0.95})
);
ground.rotation.x = -Math.PI/2;
ground.receiveShadow = true;
driveScene.add(ground);

// grass border
const grass = new THREE.Mesh(
  new THREE.PlaneGeometry(1000,1000),
  new THREE.MeshStandardMaterial({color:0x3c6b3a, roughness:1})
);
grass.rotation.x = -Math.PI/2;
grass.position.y = -0.02;
driveScene.add(grass);

// perimeter barriers
const barrierMat = new THREE.MeshStandardMaterial({color:0xff6a1a, roughness:0.6});
const barrierGeo = new THREE.BoxGeometry(4,0.9,0.4);
const half = arenaSize/2 - 1;
for(let x=-half; x<=half; x+=8){
  [half,-half].forEach(z=>{
    const b = new THREE.Mesh(barrierGeo, barrierMat);
    b.position.set(x,0.45,z);
    b.castShadow = true;
    driveScene.add(b);
    const b2 = new THREE.Mesh(barrierGeo, barrierMat);
    b2.position.set(z,0.45,x);
    b2.rotation.y = Math.PI/2;
    b2.castShadow = true;
    driveScene.add(b2);
  });
}

// scattered cones
function makeCone(x,z){
  const g = new THREE.Group();
  const cone = new THREE.Mesh(
    new THREE.ConeGeometry(0.35,0.8,12),
    new THREE.MeshStandardMaterial({color:0xff6a1a, roughness:0.6})
  );
  cone.position.y = 0.4;
  cone.castShadow = true;
  g.add(cone);
  const stripe = new THREE.Mesh(
    new THREE.CylinderGeometry(0.22,0.25,0.12,12),
    new THREE.MeshStandardMaterial({color:0xffffff})
  );
  stripe.position.y = 0.5;
  g.add(stripe);
  g.position.set(x,0,z);
  return g;
}
const coneObstacles = [];
for(let i=0;i<26;i++){
  const x = (Math.random()-0.5) * (arenaSize-20);
  const z = (Math.random()-0.5) * (arenaSize-20);
  if(Math.abs(x)<6 && Math.abs(z)<6) continue;
  const cone = makeCone(x,z);
  driveScene.add(cone);
  coneObstacles.push(cone);
}

let driveCar = null;
const carState = {
  x:0, z:0, heading:0, speed:0
};

function resizeDrive(){
  const w = driveCanvas.clientWidth, h = driveCanvas.clientHeight;
  if(w===0||h===0) return;
  driveRenderer.setSize(w,h,false);
  driveCamera.aspect = w/h;
  driveCamera.updateProjectionMatrix();
}

const keys = {forward:false, backward:false, left:false, right:false, brake:false};
window.addEventListener('keydown', (e)=>{
  if(['ArrowUp','KeyW'].includes(e.code)) keys.forward = true;
  if(['ArrowDown','KeyS'].includes(e.code)) keys.backward = true;
  if(['ArrowLeft','KeyA'].includes(e.code)) keys.left = true;
  if(['ArrowRight','KeyD'].includes(e.code)) keys.right = true;
  if(e.code === 'Space') keys.brake = true;
});
window.addEventListener('keyup', (e)=>{
  if(['ArrowUp','KeyW'].includes(e.code)) keys.forward = false;
  if(['ArrowDown','KeyS'].includes(e.code)) keys.backward = false;
  if(['ArrowLeft','KeyA'].includes(e.code)) keys.left = false;
  if(['ArrowRight','KeyD'].includes(e.code)) keys.right = false;
  if(e.code === 'Space') keys.brake = false;
});

let driveStats = null;
let driveAnimId = null;
let lastT = 0;

function startDrive(){
  driveStats = computeStats(config);
  document.getElementById('drive-vin').textContent = vin;
  document.getElementById('drive-engine').textContent = ENGINES.find(e=>e.id===config.engine).name;

  if(driveCar) driveScene.remove(driveCar);
  driveCar = buildCar(config);
  driveCar.traverse(o=>{ if(o.isMesh) o.castShadow = true; });
  driveScene.add(driveCar);

  carState.x = 0; carState.z = 0; carState.heading = 0; carState.speed = 0;

  garageActive = false;
  garageScreen.classList.add('hidden');
  driveScreen.classList.remove('hidden');
  resizeDrive();
  lastT = performance.now();
  if(driveAnimId) cancelAnimationFrame(driveAnimId);
  animateDrive();
}

function stopDrive(){
  if(driveAnimId) cancelAnimationFrame(driveAnimId);
  driveScreen.classList.add('hidden');
  garageScreen.classList.remove('hidden');
  garageActive = true;
}

function animateDrive(t){
  driveAnimId = requestAnimationFrame(animateDrive);
  const now = t || performance.now();
  let dt = (now - lastT) / 1000;
  dt = Math.min(dt, 0.05);
  lastT = now;

  const maxSpeed = driveStats.top / 9;      // world units/sec
  const accelRate = 6 * driveStats.power;   // units/sec^2
  const turnRate = 1.7 + (driveStats.handling/10)*1.1;

  if(keys.forward) carState.speed += accelRate * dt;
  else if(keys.backward) carState.speed -= accelRate * 0.8 * dt;
  else carState.speed *= (1 - Math.min(1, dt*1.1));

  if(keys.brake) carState.speed *= (1 - Math.min(1, dt*4));

  carState.speed = Math.max(-maxSpeed*0.4, Math.min(maxSpeed, carState.speed));

  const speedFactor = Math.min(1, Math.abs(carState.speed)/ (maxSpeed*0.5));
  const dir = carState.speed >= 0 ? 1 : -1;
  if(keys.left) carState.heading += turnRate * dt * speedFactor * dir;
  if(keys.right) carState.heading -= turnRate * dt * speedFactor * dir;

  carState.x += Math.sin(carState.heading) * carState.speed * dt;
  carState.z += Math.cos(carState.heading) * carState.speed * dt;

  const bound = arenaSize/2 - 4;
  carState.x = Math.max(-bound, Math.min(bound, carState.x));
  carState.z = Math.max(-bound, Math.min(bound, carState.z));

  driveCar.position.set(carState.x, 0, carState.z);
  driveCar.rotation.y = carState.heading;

  const wheelSpin = carState.speed * dt * 6;
  driveCar.wheels.forEach(w=>{ w.children[0].rotation.x += wheelSpin; w.children[1].rotation.x += wheelSpin; });

  // camera follow
  const camDist = 7.5, camHeight = 3.2;
  const desiredX = carState.x - Math.sin(carState.heading) * camDist;
  const desiredZ = carState.z - Math.cos(carState.heading) * camDist;
  driveCamera.position.x += (desiredX - driveCamera.position.x) * Math.min(1, dt*4);
  driveCamera.position.z += (desiredZ - driveCamera.position.z) * Math.min(1, dt*4);
  driveCamera.position.y += (camHeight - driveCamera.position.y) * Math.min(1, dt*4);
  driveCamera.lookAt(carState.x, 0.8, carState.z);

  resizeDrive();
  driveRenderer.render(driveScene, driveCamera);

  const kmh = Math.round(Math.abs(carState.speed) * 9);
  document.getElementById('speed-val').innerHTML = kmh + '<span>km/h</span>';
  document.getElementById('gear-out').textContent = carState.speed < -0.05 ? 'R' : 'D';
}

document.getElementById('drive-btn').addEventListener('click', startDrive);
document.getElementById('return-btn').addEventListener('click', stopDrive);
window.addEventListener('resize', ()=>{ resizePreview(); resizeDrive(); });

/* ---- Touch controls (mobile) ---- */
const isTouchDevice = ('ontouchstart' in window) || navigator.maxTouchPoints > 0;
if(isTouchDevice){
  document.getElementById('touch-controls').classList.add('active');
}
function bindTouchBtn(id, onKey){
  const el = document.getElementById(id);
  const setState = (val)=>{
    onKey(val);
    el.classList.toggle('pressed', val);
  };
  el.addEventListener('touchstart', (e)=>{ e.preventDefault(); setState(true); }, {passive:false});
  el.addEventListener('touchend', (e)=>{ e.preventDefault(); setState(false); }, {passive:false});
  el.addEventListener('touchcancel', (e)=>{ e.preventDefault(); setState(false); }, {passive:false});
  el.addEventListener('mousedown', ()=> setState(true));
  el.addEventListener('mouseup', ()=> setState(false));
  el.addEventListener('mouseleave', ()=> setState(false));
}
bindTouchBtn('steer-left', v=> keys.left = v);
bindTouchBtn('steer-right', v=> keys.right = v);
bindTouchBtn('btn-accel', v=> keys.forward = v);
bindTouchBtn('btn-brake', v=> keys.backward = v);
bindTouchBtn('btn-hand', v=> keys.brake = v);
</script>
